<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08090c" />
    <title>Level OS — Sem conexão</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        color: #f4f7f7;
        background: #08090c;
      }
      main { width: min(100%, 360px); text-align: center; }
      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 28px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background: #101518;
        border: 1px solid #243033;
      }
      svg { width: 44px; height: 44px; }
      h1 { margin: 0; font-size: 24px; letter-spacing: -0.03em; }
      p { margin: 12px 0 28px; color: #9aa8aa; font-size: 15px; line-height: 1.55; }
      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        color: #05201d;
        background: #31e6d4;
        font: inherit;
        font-weight: 700;
      }
      button:focus-visible { outline: 3px solid #f4f7f7; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none">
          <path d="M11 33 32 12l21 21" stroke="#31E6D4" stroke-width="8" />
          <path d="m11 47 21-21 21 21" stroke="#247873" stroke-width="8" />
        </svg>
      </div>
      <h1>Você está sem conexão</h1>
      <p>O Level OS precisa de internet para sincronizar seus dados com segurança. Confira a rede e tente novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
